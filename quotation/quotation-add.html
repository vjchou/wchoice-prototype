<!DOCTYPE html>
<html lang="zh-TW" data-theme="wang-choice-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王寵服務管理系統 | 服務報價 - 新增/編輯</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .service-section { display: none; }
        .service-section.is-active { display: block; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo" onclick="location.href='../index.html'">WANG CHOICE</div>
        <div class="menu-item active" onclick="location.href='quotation-list.html'">報價單維護</div>
        <div class="menu-item" onclick="location.href='../projects/projects-list.html'">服務單維護</div>
        
        <div class="menu-item submenu-parent" onclick="this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open');">
            系統參數設定 <span class="submenu-arrow">▼</span>
        </div>
        <div class="submenu">
            <div class="menu-item sub-item" onclick="location.href='../settings/area-settings.html'">作業區域管理</div>
            <div class="menu-item sub-item" onclick="location.href='../settings/item-settings.html'">全域服務項目庫</div>
        </div>
    </aside>

    <main class="main-layout">
        <header class="header-bar">
            <div class="breadcrumb">首頁 / 報價單維護 / 新增報價單</div>
            <div class="user-info">管理員 (Admin)</div>
        </header>

        <div class="content-body">
            <div class="container">
                <h3 style="margin-bottom: 20px; color: var(--primary-color);">建立服務報價單</h3>
                
                <!-- 1. 報價單基礎資訊 -->
                <div class="info-grid">
                    <div class="card" style="margin-bottom: 0;">
                        <div class="card-header">客戶與案場基礎資訊</div>
                        <div class="el-row" style="grid-template-columns: repeat(3, 1fr);">
                            <div class="input-group">
                                <label>客戶名稱</label>
                                <input type="text" id="clientName" placeholder="請輸入客戶名稱">
                            </div>
                            <div class="input-group">
                                <label>聯絡人</label>
                                <input type="text" id="contactPerson" placeholder="請輸入聯絡人姓名">
                            </div>
                            <div class="input-group">
                                <label>聯絡電話</label>
                                <input type="text" id="contactPhone" placeholder="請輸入聯絡電話">
                            </div>
                            <div class="input-group" style="grid-column: span 3;">
                                <label>服務地址</label>
                                <input type="text" id="clientAddress" placeholder="請輸入施作地址">
                            </div>
                            <div class="input-group">
                                <label>施作順序 (Priority)</label>
                                <input type="text" id="executionPriority" placeholder="例如：美容室 > 會客區">
                            </div>
                            <div class="input-group" style="grid-column: span 2;">
                                <label>重點施作備註</label>
                                <input type="text" id="executionNotes" placeholder="請輸入現場施作重點備註...">
                            </div>
                        </div>
                    </div>

                    <div class="card" style="margin-bottom: 0;">
                        <div class="card-header">業務與時程資訊</div>
                        <div class="el-row" style="grid-template-columns: 1fr;">
                            <div class="input-group">
                                <label>VIP 服務專員</label>
                                <input type="text" id="salesName" placeholder="請輸入服務專員姓名">
                            </div>
                            <div class="input-group">
                                <label>VIP 服務專線</label>
                                <input type="text" id="salesPhone" placeholder="請輸入服務專線">
                            </div>
                            <div class="input-group">
                                <label>報價有效日期</label>
                                <input type="date" id="expiryDate">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. 服務項目配置 -->
                <div class="card" style="margin-top: 20px;">
                    <div class="card-header">服務區域與項目配置</div>
                    <div class="el-tabs" style="margin-bottom: 15px;">
                        <div class="el-tabs__header">
                            <div class="el-tabs__item is-active" onclick="switchMainTab(this, 'grooming')">美容區</div>
                            <div class="el-tabs__item" onclick="switchMainTab(this, 'lobby')">會客區</div>
                        </div>
                    </div>
                    
                    <div id="grooming-section" class="service-section is-active">
                        <div id="grooming-container"></div>
                    </div>

                    <div id="lobby-section" class="service-section">
                        <div id="lobby-container"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部結算欄 (RWD) -->
        <footer class="footer-nav">
            <div class="total-summary">
                <div class="summary-item">
                    <label>單人總工時 (min)</label>
                    <input type="number" id="inputTotalTime" class="footer-input" value="0" readonly>
                </div>
                <div class="summary-item">
                    <label>雙人施工 (hr)</label>
                    <input type="number" id="inputTotalHours" class="footer-input" step="0.1" value="0" readonly>
                </div>
                <div class="summary-item">
                    <label>報價合計 ($)</label>
                    <input type="text" id="inputTotalPrice" class="footer-input total-price-input" value="0" readonly>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="location.href='quotation-list.html'">取消並返回</button>
                <button class="btn btn-primary" onclick="generateInvoice()">儲存並產製報價單</button>
            </div>
        </footer>
    </main>

    <!-- 範本：區域配置區塊 -->
    <template id="section-template">
        <div class="card section-card" style="box-shadow: none; border-color: #ebeef5; background: #fafafa; margin-bottom: 15px;">
            <div class="card-header" style="background: #fff; font-size: 14px;">
                <span>區域子配置</span>
                <button class="btn" style="padding: 2px 8px; border:none; color: #f56c6c; background: transparent;" onclick="this.closest('.section-card').remove(); calculateAll();">移除此區</button>
            </div>
            <div class="item-list">
                <!-- 動態插入服務項目 -->
            </div>
        </div>
    </template>

    <!-- 範本：細項 -->
    <template id="item-template">
        <div class="item-card" onclick="itemRowClick(this, event)">
            <div class="item-row-header">
                <div class="item-info">
                    <input type="checkbox" class="item-check" onclick="event.stopPropagation(); toggleOptions(this)">
                    <span class="item-name">項目名稱</span>
                </div>
                <span class="item-price">-</span>
            </div>
            
            <div class="item-options" style="display: none; padding-left: 28px; padding-bottom: 8px;">
                <div class="el-row" onclick="event.stopPropagation()">
                    <div class="input-group" style="margin-bottom: 0;">
                        <label>條件屬性</label>
                        <select class="condition-select" onchange="calculateAll()"></select>
                    </div>
                    <div class="input-group" style="margin-bottom: 0;">
                        <label>數量</label>
                        <input type="number" value="1" min="1" class="item-count" onchange="calculateAll()" style="padding: 10px 8px; width: 100%;">
                    </div>
                    <div class="item-unit-display" style="display: flex; align-items: flex-end; padding-bottom: 8px; color: #909399;">單位: <span class="item-unit-text"></span></div>
                    <div class="image-section">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                            <span style="font-size: 13px;">現場照片</span>
                            <input type="file" class="real-file-input" style="display: none;" accept="image/*" multiple onchange="handleFileSelect(this)">
                            <button class="btn" style="padding: 0; width: 22px; height: 22px; line-height: 20px; font-size: 18px; border-style: dashed; color: var(--primary-color); border-color: var(--primary-color);" onclick="this.previousElementSibling.click(); event.stopPropagation();">+</button>
                        </label>
                        <div class="image-upload-area" style="margin-top: 5px; min-height: 40px; display: flex; flex-wrap: wrap; gap: 5px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="../js/quotation.js"></script>
</body>
</html>
