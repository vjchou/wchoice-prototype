<!DOCTYPE html>
<html lang="zh-TW" data-theme="wang-choice-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王寵服務管理系統 | 服務項目 - 新增/編輯</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .condition-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }
        .cond-index {
            width: 24px;
            text-align: center;
            color: #909399;
            font-size: 13px;
            flex-shrink: 0;
        }
        .condition-row input { flex: 1; }
        .condition-row input.w-price { max-width: 100px; }
        .condition-row input.w-time { max-width: 90px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo" onclick="location.href='../index.html'">WANG CHOICE</div>
        <div class="menu-item" onclick="location.href='../quotation/quotation-list.html'">報價單維護</div>
        <div class="menu-item" onclick="location.href='../projects/projects-list.html'">服務單維護</div>
        
        <div class="menu-item submenu-parent open" onclick="this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open');">
            系統參數設定 <span class="submenu-arrow">▼</span>
        </div>
        <div class="submenu open">
            <div class="menu-item sub-item" onclick="location.href='area-settings.html'">作業區域管理</div>
            <div class="menu-item sub-item active" onclick="location.href='item-settings.html'">全域服務項目庫</div>
        </div>
    </aside>

    <main class="main-layout">
        <header class="header-bar">
            <div class="breadcrumb" id="breadcrumb-text">首頁 / 系統參數 / 全域服務項目庫 / 新增</div>
            <div class="user-info">管理員 (Admin)</div>
        </header>

        <div class="content-body">
            <div class="container" style="max-width: 720px;">
                <h3 id="page-title" style="margin-bottom: 20px; color: var(--primary-color);">新增服務項目</h3>

                <!-- 1. 基本資訊 -->
                <div class="card">
                    <div class="card-header">基本資訊</div>
                    <div class="el-row" style="grid-template-columns: 1fr 1fr;">
                        <div class="input-group">
                            <label>項目名稱 <span style="color:#f56c6c">*</span></label>
                            <input type="text" id="itemName" placeholder="例如：冷氣清消">
                        </div>
                        <div class="input-group">
                            <label>計量單位 <span style="color:#f56c6c">*</span></label>
                            <input type="text" id="itemUnit" placeholder="台 / 坪 / 座 / 面 / 式">
                        </div>
                    </div>
                    <div class="input-group" style="margin-bottom: 0;">
                        <label>作業區域綁定 <span style="color:#f56c6c">*</span></label>
                        <div style="display: flex; gap: 20px; margin-top: 8px; flex-wrap: wrap;">
                            <label style="display: flex; align-items: center; gap: 6px; font-weight: normal; font-size: 14px; cursor: pointer;">
                                <input type="checkbox" id="area-grooming" value="美容室" checked style="width: 16px; height: 16px;"> 美容室
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; font-weight: normal; font-size: 14px; cursor: pointer;">
                                <input type="checkbox" id="area-lobby" value="會客區" style="width: 16px; height: 16px;"> 會客區
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 2. 施作條件細項 -->
                <div class="card" style="margin-top: 20px;">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <span>施作條件細項 <span style="color:#909399; font-size: 12px; font-weight: normal;">（至少填寫 1 筆）</span></span>
                        <button class="btn" style="padding: 2px 10px; font-size: 12px; border-style: dashed;" onclick="addCondition()">+ 新增條件</button>
                    </div>

                    <!-- 欄位標題列 -->
                    <div style="display: flex; gap: 8px; margin-bottom: 8px; font-size: 12px; color: #909399; padding: 0 4px;">
                        <div style="width: 24px; flex-shrink: 0;"></div>
                        <div style="flex: 1;">條件名稱</div>
                        <div style="width: 100px;">單價 ($)</div>
                        <div style="width: 90px;">時間 (min)</div>
                        <div style="width: 36px;"></div>
                    </div>

                    <div id="condition-list">
                        <div class="condition-row" id="cond-row-0">
                            <span class="cond-index">①</span>
                            <input type="text" placeholder="例如：標準清消">
                            <input type="number" class="w-price" placeholder="800" min="0">
                            <input type="number" class="w-time" placeholder="10" min="0">
                            <button class="btn" style="padding: 5px 8px; color: #c0c4cc;" disabled>✕</button>
                        </div>
                    </div>
                </div>

                <!-- 3. 施作流程說明 -->
                <div class="card" style="margin-top: 20px;">
                    <div class="card-header">施作流程說明</div>
                    <div class="input-group" style="margin-bottom: 0;">
                        <label>標準步驟說明（按 Enter 分行即可）</label>
                        <textarea id="itemDesc" rows="5" placeholder="例如：&#10;1. 清潔濾網&#10;2. 安裝濾膜&#10;3. 抗菌鍍膜&#10;4. 清潔出風口"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer-nav">
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="location.href='item-settings.html'">取消並返回</button>
                <button class="btn btn-primary" onclick="submitItem()">儲存服務項目</button>
            </div>
        </footer>
    </main>

    <script>
        const COND_LABELS = ['①', '②', '③', '④', '⑤'];
        let condCount = 1;

        function addCondition() {
            if (condCount >= 5) {
                alert('最多支援 5 筆條件細項。');
                return;
            }
            const row = document.createElement('div');
            row.className = 'condition-row';
            row.id = `cond-row-${condCount}`;
            row.innerHTML = `
                <span class="cond-index">${COND_LABELS[condCount]}</span>
                <input type="text" placeholder="條件名稱">
                <input type="number" class="w-price" placeholder="單價" min="0">
                <input type="number" class="w-time" placeholder="時間" min="0">
                <button class="btn" style="padding: 5px 8px; color: #f56c6c;" onclick="this.closest('.condition-row').remove(); condCount = Math.max(1, condCount - 1);">✕</button>
            `;
            document.getElementById('condition-list').appendChild(row);
            condCount++;
        }

        // 支援 ?id= 參數切換編輯模式 (Prototype 模擬)
        const params = new URLSearchParams(location.search);
        const editId = params.get('id');
        if (editId) {
            document.getElementById('page-title').textContent = '編輯服務項目';
            document.getElementById('breadcrumb-text').textContent = '首頁 / 系統參數 / 全域服務項目庫 / 編輯';
        }

        function submitItem() {
            const name = document.getElementById('itemName').value.trim();
            const unit = document.getElementById('itemUnit').value.trim();
            if (!name || !unit) {
                alert('⚠️ 項目名稱與計量單位為必填欄位，請填寫後再送出。');
                return;
            }
            const action = editId ? '更新' : '新增';
            alert(`✅ 服務項目「${name}」已成功${action}！\n（Prototype 僅模擬，資料不實際儲存）`);
            location.href = 'item-settings.html';
        }
    </script>
</body>
</html>
