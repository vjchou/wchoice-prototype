<!DOCTYPE html>
<html lang="zh-TW" data-theme="wang-choice-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王寵服務管理系統 | 專業結案單</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .signature-pad {
            width: 100%;
            height: 150px;
            border: 1px solid var(--border-color);
            background: #fff;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c0c4cc;
            font-style: italic;
            cursor: crosshair;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">WANG CHOICE</div>
        <div class="menu-item active">服務專案管理</div>
        <div class="menu-item">派工調度</div>
        <div class="menu-item">現場施工紀錄</div>
        <div class="menu-item">客戶維護</div>
    </aside>

    <main class="main-layout">
        <header class="header-bar">
            <div class="breadcrumb">首頁 / 專案結案 / 最終驗收</div>
            <div class="user-info">案場經理：陳大文</div>
        </header>

        <div class="content-body">
            <div class="container" style="max-width: 900px;">
                <h3 style="margin-bottom: 20px; color: var(--primary-color);">專業結案單 - 成果驗收</h3>
                
                <div class="info-grid">
                    <div class="card">
                        <div class="card-header">完工成果總結</div>
                        <div class="summary-row"><span>施作案場</span><span>吹毛球痴 (忠孝店)</span></div>
                        <div class="summary-row"><span>開工時間</span><span>2026-03-31 09:00</span></div>
                        <div class="summary-row"><span>完工時間</span><span>2026-03-31 12:45</span></div>
                        <div class="summary-row"><span>服務負責人</span><span>王大明 (Lead)</span></div>
                        <div style="margin-top: 15px; font-weight: bold; color: #f56c6c; text-align: right; font-size: 18px;">
                            結案金額：$5,400
                        </div>
                    </div>

                    <div class="card" style="text-align: center;">
                        <div class="card-header" style="text-align: left;">客戶滿意度調查</div>
                        <div style="padding: 20px 0;">
                            <p style="margin-bottom: 15px; color: var(--text-regular); font-size: 14px;">為了提供更好的服務品質，請掃描下方 QR Code 填寫滿意度調查表</p>
                            <img src="img/qrcode.png" alt="滿意度調查 QR Code" style="width: 200px; height: 200px; border: 1px solid #eee; padding: 10px; border-radius: 8px; background: #fff;">
                            <p style="margin-top: 10px; color: var(--primary-color); font-weight: bold;">(連結至 Google 表單)</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <span>客戶確認簽章 (Digital Signature)</span>
                        <button class="btn" style="padding: 2px 10px; font-size: 12px;" onclick="clearSignature()">清除簽名</button>
                    </div>
                    <div style="background: #fff; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; touch-action: none;">
                        <canvas id="signatureCanvas" style="width: 100%; height: 200px; cursor: crosshair;"></canvas>
                    </div>
                    <p style="font-size: 12px; color: var(--text-regular); margin-top: 10px;">
                        本人已確認上述施作項目與成果，並同意結案。
                    </p>
                </div>
            </div>
        </div>

        <footer class="footer-nav">
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="location.href='index.html'">返回列表</button>
                <button class="btn btn-primary" onclick="alert('專案結案成功！已生成結案電子檔發送至客戶 Line。'); location.href='index.html'">確認結案並發送電子單</button>
            </div>
        </footer>
    </main>
    <script>
        let isDrawing = false;
        let ctx = null;
        let canvas = null;

        function initSignaturePad() {
            canvas = document.getElementById('signatureCanvas');
            if (!canvas) return;
            ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                ctx.strokeStyle = "#000000"; // 改為黑色
                ctx.lineWidth = 3;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => {
                isDrawing = true;
                const pos = getPos(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                if (e.type === 'touchstart') e.preventDefault();
            };

            const move = (e) => {
                if (!isDrawing) return;
                const pos = getPos(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                if (e.type === 'touchmove') e.preventDefault();
            };

            const stop = () => isDrawing = false;

            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start, { passive: false });
            canvas.addEventListener('touchmove', move, { passive: false });
            canvas.addEventListener('touchend', stop);
        }

        function clearSignature() {
            if (ctx && canvas) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = "#000000";
                ctx.lineWidth = 3;
            }
        }

        window.onload = initSignaturePad;
    </script>
</body>
</html>
